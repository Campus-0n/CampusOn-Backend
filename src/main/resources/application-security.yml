jwt:
  secret-key: ${JWT_SECRET_KEY}       # 32바이트 이상 랜덤 문자열
  access-token-expire-in: 1800        # 30분 (초 단위)
  refresh-token-expire-in: 1209600

spring:
  mail:
    host: smtp.gmail.com
    port: 465
    username: ${MAIL_USERNAME}
    password: ${MAIL_APP_PASSWORD}   # 구글 "앱 비밀번호"
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            ssl: true
            required: true
          connectiontimeout: 10000
          timeout: 10000
          writetimeout: 10000
